<!doctype html>
<meta charset="utf-8">
<title>clipnote 설정</title>
<style>
  body { font-family: -apple-system, 'Malgun Gothic', sans-serif; width: 340px; padding: 14px; font-size: 13px; }
  label { display: block; margin: 10px 0 4px; font-weight: 600; }
  input, select { width: 100%; padding: 6px; box-sizing: border-box; }
  button { margin-top: 14px; width: 100%; padding: 9px; border: 0; border-radius: 8px;
           background: #e5484d; color: #fff; font-weight: 600; cursor: pointer; }
  small { color: #666; }
  #saved { color: #2e7d32; display: none; }
</style>
<h3>clipnote</h3>
<label>Gemini API 키</label>
<input id="apiKey" type="password" placeholder="AI Studio에서 무료 발급">
<small><a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a> — 카드 등록 없이 발급</small>
<label>출력 언어</label>
<select id="language">
  <option value="ko">한국어</option><option value="en">English</option><option value="ja">日本語</option>
</select>
<label>모델</label>
<input id="model" placeholder="gemini-flash-lite-latest">
<label>clipnote-server URL (선택)</label>
<input id="serverUrl" placeholder="비우면 Gemini 직접 호출">
<button id="save">저장</button>
<p id="saved">저장됐습니다.</p>
<script src="options.js"></script>
